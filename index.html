<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}
.sidebar{width:420px;background:#0b1324;padding:20px;overflow:auto}
.card{background:#111827;padding:14px;border-radius:12px;margin-bottom:12px}
.kpi{font-size:20px;font-weight:bold}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 10px;background:#1e293b;border-radius:999px;cursor:pointer}
.chip.active{background:#2563eb}
#map{height:100%}
.map-wrap{flex:1}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<h2>OOH Intelligence</h2>

<div class="card">
<div>Soportes</div><div class="kpi" id="totalSoportes">0</div>
</div>

<div class="card">
<div>Cobertura</div><div class="kpi" id="ratio">0%</div>
</div>

<div class="card">
<div>Insight</div><div id="insight">—</div>
</div>

<div class="card">
<input id="search" placeholder="Buscar soporte">
<select id="comuna"></select>
<select id="categoria"></select>
<button id="reset">Reset</button>
</div>

<div class="card">
<div class="chips">
<div class="chip active" data-layer="soportes">Soportes</div>
<div class="chip active" data-layer="tricot">Tricot</div>
<div class="chip active" data-layer="h6">H6</div>
<div class="chip" data-layer="h8">H8</div>
<div class="chip active" data-layer="comunas">Comunas</div>
</div>
</div>

</div>

<div class="map-wrap"><div id="map"></div></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

const map=L.map('map').setView([-33.45,-70.66],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let soportes=[],filtrados=[],tricot=[];
let h6,h8;

let capaPts=L.markerClusterGroup({maxClusterRadius:50});
let capaTricot=L.layerGroup();
let capaH6,capaH8,capaComunas;

const layersState={soportes:true,tricot:true,h6:true,h8:false,comunas:true};

const iconSoporte=L.divIcon({html:"📍"});
const iconTricot=L.divIcon({html:"<div style='font-size:26px'>🏬</div>"});

// DATA
fetch('data/soportes_enriquecidos.json').then(r=>r.json()).then(d=>{
soportes=d.map((s,i)=>({...s,nombre:s.nombre||`Soporte ${i+1}`}));
filtrados=soportes;
init();
render();
});

fetch('data/tricot.json').then(r=>r.json()).then(d=>tricot=d);
fetch('data/h6.geojson').then(r=>r.json()).then(d=>h6=d);
fetch('data/h8.geojson').then(r=>r.json()).then(d=>h8=d);

// COMUNAS
fetch('data/comunas.geojson').then(r=>r.json()).then(d=>{
capaComunas=L.geoJSON(d,{
style:{color:'#334155',weight:1,fillOpacity:0},
onEachFeature:(f,l)=>{
const n=f.properties.Comuna||f.properties.NOM_COM;
l.bindTooltip(n);
l.on('mouseover',()=>l.setStyle({color:'#22c55e',weight:3,fillOpacity:0.1}));
l.on('mouseout',()=>capaComunas.resetStyle(l));
}
}).addTo(map);
});

// INIT
function init(){
const comunas=[...new Set(soportes.map(s=>s.comuna))];
const categorias=[...new Set(soportes.map(s=>s.categoria))];

comuna.innerHTML='<option value="">Todas</option>'+comunas.map(c=>`<option>${c}</option>`).join('');
categoria.innerHTML='<option value="">Todas</option>'+categorias.map(c=>`<option>${c}</option>`).join('');

['search','comuna','categoria'].forEach(id=>{
document.getElementById(id).addEventListener('input',filtrar);
});

reset.onclick=()=>{
filtrados=soportes;
search.value='';comuna.value='';categoria.value='';
render();
};

document.querySelectorAll('.chip').forEach(chip=>{
chip.onclick=()=>{
const k=chip.dataset.layer;
layersState[k]=!layersState[k];
chip.classList.toggle('active',layersState[k]);
render();
};
});
}

// FILTRO
function filtrar(){
const q=search.value.toLowerCase();
const c=comuna.value;
const cat=categoria.value;

filtrados=soportes.filter(s=>
(!q||(s.nombre && s.nombre.toLowerCase().includes(q))) &&
(!c||s.comuna===c) &&
(!cat||s.categoria===cat)
);

render();
}

// SCORE
function score(s){
if(s>=20)return 100;
if(s>=10)return 60;
if(s>=5)return 30;
return 10;
}

// RENDER
function render(){

capaPts.clearLayers();
capaTricot.clearLayers();

let cercanos=0;

// SOPORTES
if(layersState.soportes){
filtrados.forEach(p=>{
if(p.tricot_cercanos>0) cercanos++;

const m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.bindPopup(`
<b>${p.nombre}</b><br>
📍 ${p.comuna||'-'}<br>
🏷 ${p.categoria||'-'}<br>
📢 ${p.tipo||'-'}<br>
🏬 Tricot cercanos: ${p.tricot_cercanos||0}
`);

capaPts.addLayer(m);
});
map.addLayer(capaPts);
}

// TRICOT
if(layersState.tricot){
tricot.forEach(t=>{
const cercanosT = filtrados.filter(s=>{
const dx=s.lat-t.lat;
const dy=s.lng-t.lng;
return Math.sqrt(dx*dx+dy*dy)<0.01;
}).length;

let nivel = cercanosT>25?"Alta cobertura":cercanosT>10?"Cobertura media":"Oportunidad";

const m=L.marker([t.lat,t.lng],{icon:iconTricot});

m.bindPopup(`
<b>TIENDA TRICOT</b><br>
📍 ${t.comuna}<br>
📊 Soportes cercanos: ${cercanosT}<br>
💡 ${nivel}
`);

capaTricot.addLayer(m);
});
map.addLayer(capaTricot);
}

// KPI GLOBAL
const total=filtrados.length;
const ratioVal = total ? Math.round((cercanos/total)*100) : 0;

totalSoportes.innerText=total;
ratio.innerText=ratioVal+"%";

insight.innerText =
ratioVal>60?"Alta cobertura consolidada":
ratioVal>30?"Cobertura en desarrollo":
"Alta oportunidad comercial";

// HEX
renderHex();
}

// HEX
function renderHex(){

if(capaH6) map.removeLayer(capaH6);
if(capaH8) map.removeLayer(capaH8);

const z=map.getZoom();

// H6
if(z<=11 && layersState.h6 && h6){
capaH6=L.geoJSON(h6,{
style:{color:'#2563eb',fillOpacity:0.3},
onEachFeature:(f,l)=>{
const s=score(f.properties.soportes||0);
l.bindPopup(`
<b>H6</b><br>
Soportes: ${f.properties.soportes}<br>
Score: ${s}<br>
💡 ${s>60?"Zona caliente":"Potencial"}
`);
}
}).addTo(map);
}

// H8
if(z>11 && z<=14 && layersState.h8 && h8){
capaH8=L.geoJSON(h8,{
style:{color:'#9333ea',fillOpacity:0.25},
onEachFeature:(f,l)=>{
const s=score(f.properties.soportes||0);
l.bindPopup(`
<b>H8</b><br>
Soportes: ${f.properties.soportes}<br>
Score: ${s}<br>
💡 ${s>60?"Alta densidad":"Explorar"}
`);
}
}).addTo(map);
}

}

map.on('zoomend',render);

</script>

</body>
</html>
