<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OOH Intelligence - Demo Cliente</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
body{margin:0;font-family:Inter,Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:420px;
background:#0b1324;
padding:20px;
overflow:auto;
border-right:1px solid #1e293b;
}

h2{margin-bottom:10px}
h3{margin-bottom:10px;font-size:14px;color:#94a3b8}

.card{
background:#111827;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

.kpi{
font-size:20px;
font-weight:bold;
}

.label{
font-size:12px;
color:#9ca3af;
}

/* FILTROS */
input,select,button{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#1e293b;
color:#fff;
border:none;
}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
padding:6px 10px;
background:#1e293b;
border-radius:999px;
cursor:pointer;
font-size:12px;
}
.chip.active{background:#2563eb}

/* MAP */
.map-wrap{flex:1}
#map{height:100%}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<h2>OOH Intelligence</h2>
<div class="label">Análisis territorial publicitario</div>

<!-- KPIs -->
<div class="card">
<div class="label">Soportes totales</div>
<div class="kpi" id="totalSoportes">0</div>
</div>

<div class="card">
<div class="label">Cobertura cercana a retail</div>
<div class="kpi" id="ratio">0%</div>
</div>

<div class="card">
<div class="label">Tiendas Tricot</div>
<div class="kpi" id="totalTricot">0</div>
</div>

<div class="card">
<div class="label">Oportunidad detectada</div>
<div id="insight">—</div>
</div>

<!-- FILTROS -->
<div class="card">
<h3>Filtros</h3>
<input id="search" placeholder="Buscar soporte">
<select id="comuna"></select>
<select id="categoria"></select>
<button id="reset">Limpiar filtros</button>
</div>

<!-- CAPAS -->
<div class="card">
<h3>Visualización</h3>
<div class="chips">
<div class="chip active" data-layer="soportes">Soportes</div>
<div class="chip active" data-layer="tricot">Tricot</div>
<div class="chip active" data-layer="h6">H6</div>
<div class="chip" data-layer="h8">H8</div>
<div class="chip active" data-layer="comunas">Comunas</div>
</div>
</div>

</div>

<div class="map-wrap">
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

// MAPA
const map=L.map('map').setView([-33.45,-70.66],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// DATA
let soportes=[],filtrados=[],tricot=[];
let h6,h8;

let capaPts=L.markerClusterGroup({maxClusterRadius:50});
let capaTricot=L.layerGroup();
let capaH6,capaH8,capaComunas;

const layersState={
soportes:true,
tricot:true,
h6:true,
h8:false,
comunas:true
};

// ICONOS
const iconSoporte=L.divIcon({html:"📍"});
const iconTricot=L.divIcon({html:"<div style='font-size:26px'>🏬</div>"});

// DATA LOAD
fetch('data/soportes_enriquecidos.json').then(r=>r.json()).then(d=>{
soportes=d.map((s,i)=>({...s,nombre:s.nombre||`Soporte ${i+1}`}));
filtrados=soportes;
init();
render();
});

fetch('data/tricot.json').then(r=>r.json()).then(d=>{
tricot=d;
totalTricot.innerText=tricot.length;
});

fetch('data/h6.geojson').then(r=>r.json()).then(d=>h6=d);
fetch('data/h8.geojson').then(r=>r.json()).then(d=>h8=d);

// INIT
function init(){

const comunas=[...new Set(soportes.map(s=>s.comuna))];
const categorias=[...new Set(soportes.map(s=>s.categoria))];

comuna.innerHTML='<option value="">Todas</option>'+comunas.map(c=>`<option>${c}</option>`).join('');
categoria.innerHTML='<option value="">Todas</option>'+categorias.map(c=>`<option>${c}</option>`).join('');

['search','comuna','categoria'].forEach(id=>{
document.getElementById(id).addEventListener('input',filtrar);
});

reset.onclick=()=>{
filtrados=soportes;
search.value='';comuna.value='';categoria.value='';
render();
};

// chips capas
document.querySelectorAll('.chip').forEach(chip=>{
chip.onclick=()=>{
const k=chip.dataset.layer;
layersState[k]=!layersState[k];
chip.classList.toggle('active',layersState[k]);
render();
};
});

}

// FILTRO
function filtrar(){
const q=search.value.toLowerCase();
const c=comuna.value;
const cat=categoria.value;

filtrados=soportes.filter(s=>
(!q||(s.nombre && s.nombre.toLowerCase().includes(q))) &&
(!c||s.comuna===c) &&
(!cat||s.categoria===cat)
);

render();
}

// RENDER
function render(){

capaPts.clearLayers();
capaTricot.clearLayers();

let cercanos=0;

// SOPORTES
if(layersState.soportes){
filtrados.forEach(p=>{
if(p.tricot_cercanos>0) cercanos++;

const m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.bindPopup(`
<b>${p.nombre}</b><br>
📍 ${p.comuna}<br>
🏷 ${p.categoria}<br>
📢 ${p.tipo||''}<br>
🏬 Tricot cercanos: ${p.tricot_cercanos}
`);

capaPts.addLayer(m);
});

map.addLayer(capaPts);
}else{
map.removeLayer(capaPts);
}

// TRICOT
if(layersState.tricot){
tricot.forEach(t=>{
const m=L.marker([t.lat,t.lng],{icon:iconTricot});
m.bindPopup(`<b>Tienda Tricot</b><br>${t.comuna}`);
capaTricot.addLayer(m);
});
map.addLayer(capaTricot);
}else{
map.removeLayer(capaTricot);
}

// KPI
const total=filtrados.length;
const ratioVal = total ? Math.round((cercanos/total)*100) : 0;

totalSoportes.innerText=total;
ratio.innerText=ratioVal+"%";

insight.innerText =
ratioVal > 60 ? "Alta cobertura consolidada" :
ratioVal > 30 ? "Zona con potencial" :
"Oportunidad comercial relevante";

// HEX
renderHex();

}

// HEX
function renderHex(){

if(capaH6) map.removeLayer(capaH6);
if(capaH8) map.removeLayer(capaH8);

const z=map.getZoom();

if(z<=11 && layersState.h6 && h6){
capaH6=L.geoJSON(h6,{style:{color:'#2563eb',fillOpacity:0.3}}).addTo(map);
}

if(z>11 && z<=14 && layersState.h8 && h8){
capaH8=L.geoJSON(h8,{style:{color:'#9333ea',fillOpacity:0.25}}).addTo(map);
}

}

map.on('zoomend',render);

</script>

</body>
</html>
