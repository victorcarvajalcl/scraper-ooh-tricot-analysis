<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OOH + TRICOT PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}
.sidebar{width:420px;background:#0b1324;padding:15px;overflow:auto}
.panel{margin-bottom:18px}
input,select,button{width:100%;padding:10px;margin-bottom:10px;border-radius:10px;background:#091a36;color:#fff;border:none}
.map-wrap{flex:1}
#map{height:100%}

.stat{background:#081a3b;padding:10px;border-radius:10px;margin-bottom:8px}
.kpi{background:#14213d;padding:12px;border-radius:12px;margin-bottom:10px}

.ranking-item{background:#0a1b3a;padding:10px;border-radius:10px;margin-bottom:6px}

.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 12px;background:#0a1b3a;border-radius:999px;cursor:pointer}
.chip.active{background:#2563eb}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<h2>OOH + TRICOT</h2>

<div class="panel">
<h3>Resumen</h3>
<div class="stat">Soportes: <b id="totalSoportes">0</b></div>
<div class="stat">Comunas: <b id="totalComunas">0</b></div>
<div class="stat">Score prom: <b id="avgScore">0</b></div>
<div class="stat">Score máx: <b id="topScore">0</b></div>
</div>

<div class="panel">
<h3>Análisis Comercial</h3>
<div class="kpi">Tiendas Tricot: <b id="totalTricot">0</b></div>
<div class="kpi">% Soportes cerca: <b id="ratio">0%</b></div>
<div class="kpi">Soportes cercanos: <b id="soportesCercanos">0</b></div>
<div class="kpi">Sin cobertura: <b id="soportesLejanos">0</b></div>
</div>

<div class="panel">
<h3>Cargar datos</h3>
<input type="file" id="fileInput" accept=".json">
</div>

<div class="panel">
<h3>Filtros</h3>
<input id="search" placeholder="Buscar soporte">
<select id="comuna"></select>
<select id="categoria"></select>
<button id="reset">Reset</button>
</div>

<div class="panel">
<h3>Capas</h3>
<div class="chips">
<div class="chip active" data-layer="soportes">Soportes</div>
<div class="chip active" data-layer="tricot">Tricot</div>
<div class="chip active" data-layer="h6">H6</div>
<div class="chip" data-layer="h8">H8</div>
<div class="chip active" data-layer="comunas">Comunas</div>
</div>
</div>

<div class="panel">
<h3>Top zonas</h3>
<div id="ranking"></div>
</div>

</div>

<div class="map-wrap">
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

const map=L.map('map').setView([-33.45,-70.66],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

map.createPane('hex'); map.getPane('hex').style.zIndex=400;
map.createPane('points'); map.getPane('points').style.zIndex=650;
map.createPane('tricot'); map.getPane('tricot').style.zIndex=700;

let soportes=[],filtrados=[],tricot=[];
let h6,h8;
let capaPts=L.markerClusterGroup();
let capaTricot=L.layerGroup();
let capaH6,capaH8,capaComunas;

const layersState={soportes:true,tricot:true,h6:true,h8:false,comunas:true};

const iconSoporte=L.divIcon({html:"📍",iconSize:[20,20]});
const iconTricot=L.divIcon({html:"<div style='font-size:24px'>🏬</div>",iconSize:[26,26]});

function score(s){
if(s>=20)return 100;
if(s>=10)return 60;
if(s>=5)return 30;
return 10;
}

// 🔥 ZOOM LOGIC
function getZoomMode(){
const z=map.getZoom();
if(z<=11) return "h6";
if(z<=14) return "h8";
return "points";
}

// DATA
fetch('data/soportes_enriquecidos.json').then(r=>r.json()).then(d=>{
soportes=d.map((s,i)=>({
...s,
nombre:s.nombre||s.NOMBRE||s.titulo||`Soporte ${i+1}`
}));
filtrados=soportes;
init();
render();
});

fetch('data/tricot.json').then(r=>r.json()).then(d=>{
tricot=d;
totalTricot.innerText=tricot.length;
});

fetch('data/h6.geojson').then(r=>r.json()).then(d=>h6=d);
fetch('data/h8.geojson').then(r=>r.json()).then(d=>h8=d);

fetch('data/comunas.geojson').then(r=>r.json()).then(d=>{
capaComunas=L.geoJSON(d,{
style:{color:'#111',weight:1},
onEachFeature:(f,l)=>{
const n=f.properties.Comuna||f.properties.NOM_COM;
l.bindTooltip(n);
l.on('mouseover',()=>l.setStyle({color:'#22c55e',weight:3}));
l.on('mouseout',()=>capaComunas.resetStyle(l));
}
});
if(layersState.comunas) capaComunas.addTo(map);
});

// FILE INPUT
fileInput.addEventListener('change',function(e){
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=function(ev){
const data=JSON.parse(ev.target.result);
soportes=data;
filtrados=data;
init();
render();
};
reader.readAsText(file);
});

// INIT
function init(){

const comunas=[...new Set(soportes.map(s=>s.comuna))];
const categorias=[...new Set(soportes.map(s=>s.categoria))];

comuna.innerHTML='<option value="">Todas</option>'+comunas.map(c=>`<option>${c}</option>`).join('');
categoria.innerHTML='<option value="">Todas</option>'+categorias.map(c=>`<option>${c}</option>`).join('');

['search','comuna','categoria'].forEach(id=>{
document.getElementById(id).addEventListener('input',filtrar);
});

reset.onclick=()=>{
filtrados=soportes;
search.value='';comuna.value='';categoria.value='';
render();
};

document.querySelectorAll('.chip').forEach(chip=>{
chip.onclick=()=>{
const k=chip.dataset.layer;
layersState[k]=!layersState[k];
chip.classList.toggle('active',layersState[k]);
render();
};
});

}

// FILTRO
function filtrar(){
const q=search.value.toLowerCase();
const c=comuna.value;
const cat=categoria.value;

filtrados=soportes.filter(s=>
(!q||(s.nombre && s.nombre.toLowerCase().includes(q))) &&
(!c||s.comuna===c) &&
(!cat||s.categoria===cat)
);

render();
}

// RENDER
function render(){

map.removeLayer(capaPts);
capaPts=L.markerClusterGroup();

let cercanos=0;
const mode=getZoomMode();

// 🔴 SOPORTES SOLO EN ZOOM ALTO
if(mode==="points" && layersState.soportes){

filtrados.forEach(p=>{
if(p.tricot_cercanos>0) cercanos++;

const m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.bindPopup(`
<b>${p.nombre}</b><br>
📍 ${p.comuna}<br>
🏷 ${p.categoria}<br>
🏬 Tricot cercanos: ${p.tricot_cercanos}
`);

capaPts.addLayer(m);
});

map.addLayer(capaPts);
}

// 🟢 TRICOT
if(layersState.tricot){
capaTricot.clearLayers();

tricot.forEach(t=>{
const m=L.marker([t.lat,t.lng],{icon:iconTricot});
m.bindPopup(`<b>TRICOT</b><br>${t.comuna}`);
capaTricot.addLayer(m);
});

map.addLayer(capaTricot);
}

// COMUNAS
if(capaComunas){
if(layersState.comunas && !map.hasLayer(capaComunas)) map.addLayer(capaComunas);
if(!layersState.comunas && map.hasLayer(capaComunas)) map.removeLayer(capaComunas);
}

renderHex(cercanos);
}

// HEX + KPI
function renderHex(cercanos){

if(capaH6) map.removeLayer(capaH6);
if(capaH8) map.removeLayer(capaH8);

let feats=[];
const mode=getZoomMode();

// 🔵 H6
if(mode==="h6" && layersState.h6 && h6){
feats=h6.features;

capaH6=L.geoJSON(h6,{
pane:'hex',
style:f=>({color:'#2563eb',fillOpacity:0.35}),
onEachFeature:(f,l)=>{
const s=score(f.properties.soportes||0);
l.bindPopup(`H6<br>Soportes:${f.properties.soportes}<br>Score:${s}`);
}
}).addTo(map);
}

// 🟣 H8
if(mode==="h8" && layersState.h8 && h8){
feats=h8.features;

capaH8=L.geoJSON(h8,{
pane:'hex',
style:f=>({color:'#9333ea',fillOpacity:0.30}),
onEachFeature:(f,l)=>{
const s=score(f.properties.soportes||0);
l.bindPopup(`H8<br>Soportes:${f.properties.soportes}<br>Score:${s}`);
}
}).addTo(map);
}

// KPI
const total=filtrados.length;
const ratioVal = total ? Math.round((cercanos/total)*100) : 0;

ratio.innerText=ratioVal+"%";
soportesCercanos.innerText=cercanos;
soportesLejanos.innerText=total-cercanos;

// RANKING
const top=feats.map(f=>({...f,s:score(f.properties.soportes||0)}))
.sort((a,b)=>b.s-a.s).slice(0,5);

ranking.innerHTML='';
top.forEach((f,i)=>{
ranking.innerHTML+=`<div class="ranking-item">#${i+1} Score ${f.s}</div>`;
});

const max=top[0]?.s||0;
const avg=top.length?Math.round(top.reduce((a,b)=>a+b.s,0)/top.length):0;

topScore.innerText=max;
avgScore.innerText=avg;
totalSoportes.innerText=filtrados.length;
totalComunas.innerText=new Set(filtrados.map(s=>s.comuna)).size;

}

map.on('zoomend',render);

</script>

</body>
</html>
