<script>

const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ================= VARIABLES
let soportes=[],filtrados=[],tricot=[];
let h3=null,h6=null,h8=null;

let capaPts=L.markerClusterGroup({maxClusterRadius:50});
let capaTricot=L.layerGroup();
let capaH3,capaH6,capaH8,capaComunas;

const layersState={
soportes:true,
tricot:true,
h6:true,
h8:false,
h3:false,
comunas:true
};

// ================= DEBUG
function log(msg){
console.log("OOH:",msg);
}

// ================= LOAD DATOS SEGURO
Promise.all([
fetch('data/soportes_enriquecidos.json').then(r=>r.json()),
fetch('data/tricot.json').then(r=>r.json()).catch(()=>[]),
fetch('data/h3.geojson').then(r=>r.json()).catch(()=>null),
fetch('data/h6.geojson').then(r=>r.json()),
fetch('data/h8.geojson').then(r=>r.json()),
fetch('data/comunas.geojson').then(r=>r.json())
])
.then(([soportesData,tricotData,h3Data,h6Data,h8Data,comunasData])=>{

log("datos cargados");

soportes=soportesData.map((s,i)=>({...s,nombre:s.nombre||`Soporte ${i+1}`}));
filtrados=soportes;
tricot=tricotData;
h3=h3Data;
h6=h6Data;
h8=h8Data;

// ================= COMUNAS
capaComunas=L.geoJSON(comunasData,{
style:{color:'#22c55e',weight:1,fillOpacity:0.05},
onEachFeature:(f,l)=>{
l.on('click',()=>map.fitBounds(l.getBounds()));
}
}).addTo(map);

init();
render();

})
.catch(err=>{
console.error("ERROR CARGANDO DATOS:",err);
alert("Error cargando datos. Revisa consola (F12)");
});

// ================= INIT
function init(){

const comunas=[...new Set(soportes.map(s=>s.comuna).filter(Boolean))];
const categorias=[...new Set(soportes.map(s=>s.categoria).filter(Boolean))];

comuna.innerHTML='<option value="">Todas</option>'+comunas.map(c=>`<option>${c}</option>`).join('');
categoria.innerHTML='<option value="">Todas</option>'+categorias.map(c=>`<option>${c}</option>`).join('');

['search','comuna','categoria'].forEach(id=>{
document.getElementById(id).addEventListener('input',filtrar);
});

reset.onclick=()=>{
filtrados=soportes;
search.value='';
comuna.value='';
categoria.value='';
render();
};

document.querySelectorAll('.chip').forEach(chip=>{
chip.onclick=()=>{
const k=chip.dataset.layer;
layersState[k]=!layersState[k];
chip.classList.toggle('active',layersState[k]);
render();
};
});

}

// ================= FILTRO
function filtrar(){

const q=search.value.toLowerCase();
const c=comuna.value;
const cat=categoria.value;

filtrados=soportes.filter(s=>
(!q||(s.nombre||"").toLowerCase().includes(q)) &&
(!c||s.comuna===c) &&
(!cat||s.categoria===cat)
);

render();
}

// ================= RENDER
function render(){

if(!soportes.length){
log("sin datos");
return;
}

capaPts.clearLayers();
capaTricot.clearLayers();

// SOPORTES
if(layersState.soportes){
filtrados.forEach(p=>{
if(!p.lat || !p.lng) return;

capaPts.addLayer(
L.marker([p.lat,p.lng]).bindPopup(p.nombre)
);
});
map.addLayer(capaPts);
}

// TRICOT
if(layersState.tricot && tricot.length){
tricot.forEach(t=>{
capaTricot.addLayer(L.marker([t.lat,t.lng]));
});
map.addLayer(capaTricot);
}

// KPI
totalSoportes.innerText=filtrados.length;

// HEX
renderHex();
}

// ================= HEX
function renderHex(){

if(capaH3) map.removeLayer(capaH3);
if(capaH6) map.removeLayer(capaH6);
if(capaH8) map.removeLayer(capaH8);

const bounds=map.getBounds();

// H3
if(layersState.h3 && h3){
capaH3=L.geoJSON(h3,{style:{color:'#000'}}).addTo(map);
}

// H6
if(layersState.h6 && h6){
capaH6=L.geoJSON(h6.features.filter(f=>bounds.intersects(L.geoJSON(f).getBounds())),{
style:{color:'#2563eb',fillOpacity:0.3}
}).addTo(map);
}

// H8
if(layersState.h8 && h8){
capaH8=L.geoJSON(h8.features.filter(f=>bounds.intersects(L.geoJSON(f).getBounds())),{
style:{color:'#9333ea',fillOpacity:0.2}
}).addTo(map);
}

}

map.on('zoomend moveend',render);

</script>
